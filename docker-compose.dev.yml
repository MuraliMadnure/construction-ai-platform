version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: construction-ai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: construction_ai_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - construction-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: construction-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - construction-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: construction-ai-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/construction_ai_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-key-change-in-production-min-32-chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: dev-refresh-secret-key-change-in-production-32-chars
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: "*"
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/.env.docker:/app/.env
      - ./backend/uploads:/app/uploads
    networks:
      - construction-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: construction-ai-frontend
    environment:
      VITE_API_URL: http://192.168.162.192:5001/api/v1
      VITE_SOCKET_URL: http://192.168.162.192:5001
      VITE_ENV: development
      VITE_APP_NAME: Construction AI Platform
      VITE_APP_VERSION: 1.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - construction-network
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

networks:
  construction-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
